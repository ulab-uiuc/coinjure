name: Deploy Blog & Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs dependencies
        run: pip install mkdocs mkdocs-material

      - name: Build site
        run: |
          # Build MkDocs docs into site/docs/
          mkdocs build --site-dir site/docs

          # Copy blog to site root (index + images)
          cp blog/index.html site/index.html
          cp blog/*.png site/ 2>/dev/null || true

          # Add .nojekyll to prevent GitHub Pages from ignoring _files
          touch site/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
