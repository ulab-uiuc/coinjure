use_directory_urls: false
site_name: Coinjure
site_description: An intelligent trading agent for Polymarket & Kalshi prediction markets, powered by Social World Models and LLM-driven decision making.
site_url: https://ulab-uiuc.github.io/coinjure
repo_url: https://github.com/ulab-uiuc/coinjure
repo_name: ulab-uiuc/coinjure
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    scheme: default
  font: false
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/custom.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: CLI_QUICK_START.md
  - CLI Reference:
      - Monitoring: CLI_MONITORING.md
  - API Reference:
      - Overview: api/index.md
      - Strategy: api/strategy.md
      - Trading Types: api/trading.md
      - Data Sources: api/data.md
      - Market Relations: api/relations.md
      - Engine: api/engine.md
  - Architecture:
      - Project Specification: PROJECT_SPECIFICATION.md
